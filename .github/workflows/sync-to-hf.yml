name: Sync to HuggingFace

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF
        run: |
          git remote add hf https://thepro2026:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/thepro2026/openclaw
          git push hf main --force
